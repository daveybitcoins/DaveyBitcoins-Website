name: Update BTC price data

on:
  schedule:
    - cron: '45 14 * * *'   # daily at 14:45 UTC (9:45 AM EST)
    - cron: '0 22 * * *'    # daily at 22:00 UTC (5:00 PM EST)
  workflow_dispatch:         # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest daily close and append to CSV
        run: |
          LAST_DATE=$(tail -1 data.csv | cut -d',' -f1)
          echo "Last date in CSV: $LAST_DATE"

          # Fetch recent daily data from CoinGecko (free, no key needed)
          JSON=$(curl -sf "https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily")
          if [ -z "$JSON" ]; then
            echo "API call failed, skipping"
            exit 0
          fi

          # Parse prices, keep only last price per date, append new dates
          ADDED=0
          while IFS= read -r line; do
            DATE=$(echo "$line" | cut -d'|' -f1)
            PRICE=$(echo "$line" | cut -d'|' -f2)
            if [[ "$DATE" > "$LAST_DATE" ]]; then
              echo "${DATE},${PRICE}" >> data.csv
              ADDED=$((ADDED+1))
              echo "Added: $DATE, $PRICE"
            fi
          done < <(echo "$JSON" | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          by_date = {}
          for ts_ms, price in data['prices']:
              dt = datetime.fromtimestamp(ts_ms / 1000, tz=timezone.utc)
              d = dt.strftime('%Y-%m-%d')
              by_date[d] = round(price, 2)  # last value wins
          for d in sorted(by_date):
              print(f'{d}|{by_date[d]}')
          ")

          echo "Added $ADDED new entries"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update BTC price data $(date -u +%Y-%m-%d)"
          git push
