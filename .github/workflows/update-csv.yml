name: Update price data

on:
  schedule:
    - cron: '45 13 * * 1-5'   # weekdays at 13:45 UTC (9:45 AM EDT)
    - cron: '0 21 * * 1-5'    # weekdays at 21:00 UTC (5:00 PM EDT)
  workflow_dispatch:         # manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest daily close and append to CSV
        run: |
          LAST_DATE=$(tail -1 data.csv | cut -d',' -f1)
          echo "Last date in CSV: $LAST_DATE"

          # Fetch recent daily data from CoinGecko (free, no key needed)
          JSON=$(curl -sf "https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=7&interval=daily")
          if [ -z "$JSON" ]; then
            echo "API call failed, skipping"
            exit 0
          fi

          # Parse prices, update today's price if changed, append new dates
          ADDED=0
          UPDATED=0
          while IFS= read -r line; do
            DATE=$(echo "$line" | cut -d'|' -f1)
            PRICE=$(echo "$line" | cut -d'|' -f2)
            if [[ "$DATE" > "$LAST_DATE" ]]; then
              echo "${DATE},${PRICE}" >> data.csv
              ADDED=$((ADDED+1))
              echo "Added: $DATE, $PRICE"
            elif [[ "$DATE" == "$LAST_DATE" ]]; then
              OLD_PRICE=$(tail -1 data.csv | cut -d',' -f2)
              if [[ "$PRICE" != "$OLD_PRICE" ]]; then
                sed -i "$ s/.*/${DATE},${PRICE}/" data.csv
                UPDATED=1
                echo "Updated: $DATE, $OLD_PRICE -> $PRICE"
              fi
            fi
          done < <(echo "$JSON" | python3 -c "
          import sys, json
          from datetime import datetime, timezone
          data = json.load(sys.stdin)
          by_date = {}
          for ts_ms, price in data['prices']:
              dt = datetime.fromtimestamp(ts_ms / 1000, tz=timezone.utc)
              d = dt.strftime('%Y-%m-%d')
              by_date[d] = round(price, 2)  # last value wins
          for d in sorted(by_date):
              print(f'{d}|{by_date[d]}')
          ")

          echo "Added $ADDED new entries, updated $UPDATED existing"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yfinance
        run: pip install yfinance

      - name: Fetch latest SPY and VIX data
        run: |
          python3 -c "
          import yfinance as yf
          import csv, os
          from datetime import datetime

          def update_csv(ticker, filename):
              filepath = filename
              if not os.path.exists(filepath):
                  print(f'{filepath} not found, skipping')
                  return

              # Read existing dates
              existing = {}
              with open(filepath, 'r') as f:
                  reader = csv.reader(f)
                  header = next(reader)
                  for row in reader:
                      existing[row[0]] = row[1]

              last_date = max(existing.keys())
              print(f'{ticker}: last date in CSV = {last_date}')

              # Fetch last 7 days
              data = yf.download(ticker, period='7d', interval='1d', progress=False)
              if data.empty:
                  print(f'  No data returned for {ticker}')
                  return

              added = 0
              updated = 0
              for date, row in data.iterrows():
                  ds = date.strftime('%Y-%m-%d')
                  close_val = row['Close']
                  price = str(round(float(close_val.iloc[0] if hasattr(close_val, 'iloc') else close_val), 2))
                  if ds > last_date:
                      existing[ds] = price
                      added += 1
                      print(f'  Added: {ds}, {price}')
                  elif ds == last_date and price != existing.get(ds):
                      existing[ds] = price
                      updated += 1
                      print(f'  Updated: {ds}, {existing.get(ds)} -> {price}')

              # Write back sorted
              with open(filepath, 'w', newline='') as f:
                  f.write('date,price\n')
                  for d in sorted(existing.keys()):
                      f.write(f'{d},{existing[d]}\n')

              print(f'  {ticker}: added {added}, updated {updated}')

          update_csv('SPY', 'data_spy.csv')
          update_csv('^VIX', 'data_vix.csv')
          "

      - name: Fetch live SPY/QQQ quotes from Finnhub
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: |
          python3 -c "
          import urllib.request, json, csv, os
          from datetime import datetime, timezone

          key = os.environ.get('FINNHUB_KEY', '')
          if not key:
              print('No FINNHUB_KEY secret set, skipping live quotes')
              exit(0)

          def update_with_finnhub(symbol, filename):
              if not os.path.exists(filename):
                  print(f'{filename} not found, skipping')
                  return
              url = f'https://finnhub.io/api/v1/quote?symbol={symbol}&token={key}'
              try:
                  resp = urllib.request.urlopen(url)
                  data = json.loads(resp.read())
              except Exception as e:
                  print(f'  Finnhub API error for {symbol}: {e}')
                  return
              if not data.get('c') or data['c'] == 0:
                  print(f'  No valid quote for {symbol}')
                  return
              price = str(round(data['c'], 2))
              ts = data.get('t', 0)
              dt = datetime.fromtimestamp(ts, tz=timezone.utc)
              date_str = dt.strftime('%Y-%m-%d')

              existing = {}
              with open(filename, 'r') as f:
                  reader = csv.reader(f)
                  header = next(reader)
                  for row in reader:
                      existing[row[0]] = row[1]

              last_date = max(existing.keys())
              if date_str >= last_date:
                  old = existing.get(date_str, 'N/A')
                  existing[date_str] = price
                  with open(filename, 'w', newline='') as f:
                      f.write('date,price\n')
                      for d in sorted(existing.keys()):
                          f.write(f'{d},{existing[d]}\n')
                  print(f'  {symbol}: Finnhub quote {price} for {date_str} (was {old})')
              else:
                  print(f'  {symbol}: Finnhub date {date_str} older than CSV {last_date}, skipping')

          update_with_finnhub('SPY', 'data_spy.csv')
          update_with_finnhub('QQQ', 'data_qqq.csv')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv data_spy.csv data_qqq.csv data_vix.csv
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update price data $(date -u +%Y-%m-%d)"
          git push
